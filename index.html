<!DOCTYPE html>    
<html lang="th">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>For Hawaii ❤️</title>    
    
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">    
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">    
    
<style>    
*{box-sizing:border-box;}    
body{    
margin:0;    
font-family:'Prompt',sans-serif;    
background:black;    
overflow:hidden;    
}    
    
/* Loader */    
#loader{    
position:fixed;    
width:100%;    
height:100vh;    
display:flex;    
justify-content:center;    
align-items:center;    
font-size:22px;    
background:black;    
color:white;    
animation:fadeOut 3s forwards;    
z-index:200;    
}    
@keyframes fadeOut{    
0%{opacity:1;}    
80%{opacity:1;}    
100%{opacity:0;visibility:hidden;}    
}    
    
/* Login */    
#login{    
display:none;    
position:fixed;    
width:100%;    
height:100vh;    
background:linear-gradient(45deg,#000,#2c003e);    
display:flex;    
justify-content:center;    
align-items:center;    
flex-direction:column;    
color:white;    
text-align:center;    
padding:20px;    
z-index:150;    
}    
#login input{    
padding:12px;    
border-radius:30px;    
border:none;    
text-align:center;    
margin-top:15px;    
}    
#login button{    
padding:12px 20px;    
border:none;    
border-radius:30px;    
background:#ff2e63;    
color:white;    
margin-top:15px;    
}    
    
/* Main */    
#mainSite{    
display:none;    
min-height:100vh;    
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);    
background-size:400% 400%;    
animation:gradientBG 12s ease infinite;    
overflow-y:auto;    
padding:20px;    
}    
@keyframes gradientBG{    
0%{background-position:0% 50%;}    
50%{background-position:100% 50%;}    
100%{background-position:0% 50%;}    
}    
    
.container{    
display:flex;    
justify-content:center;    
align-items:center;    
flex-direction:column;    
}    
    
.card{    
width:100%;    
max-width:420px;    
background:rgba(255,255,255,0.95);    
padding:25px;    
border-radius:30px;    
box-shadow:0 20px 60px rgba(0,0,0,0.25);    
text-align:center;    
position:relative;    
z-index:2;    
transition:0.3s;    
}    
    
.blur{filter:blur(6px);}    
    
.card img{    
width:100%;    
border-radius:20px;    
margin-bottom:15px;    
transition:0.6s;    
}    
    
.zoom{animation:zoomIn 0.6s ease;}    
@keyframes zoomIn{    
0%{transform:scale(1.1);opacity:0;}    
100%{transform:scale(1);opacity:1;}    
}    
    
h1{color:#ff2e63;}    
    
button{    
width:100%;    
padding:14px;    
margin:10px 0;    
border:none;    
border-radius:40px;    
font-size:15px;    
cursor:pointer;    
transition:0.3s;    
}    
button:hover{transform:scale(1.05);}    
    
.loveBtn{background:linear-gradient(45deg,#ff2e63,#ff6b81);color:white;}    
.secondary{background:#eee;}    
    
.floating{    
position:fixed;    
bottom:-20px;    
font-size:18px;    
animation:floatUp linear infinite;    
opacity:0.6;    
pointer-events:none;    
z-index:1;    
}    
@keyframes floatUp{    
0%{transform:translateY(0);}    
100%{transform:translateY(-110vh);}    
}    
    
.popup{    
position:fixed;    
top:50%;    
left:50%;    
transform:translate(-50%,-50%) scale(0);    
background:white;    
padding:30px;    
border-radius:25px;    
box-shadow:0 20px 60px rgba(0,0,0,0.3);    
text-align:center;    
transition:0.4s;    
z-index:100;    
width:85%;    
max-width:350px;    
}    
.popup.show{transform:translate(-50%,-50%) scale(1);}    
.popupTitle{color:#ff2e63;margin-bottom:15px;font-size:20px;}    
.popupText{font-size:16px;line-height:1.8;color:#444;min-height:120px;white-space:pre-line;}    
</style>    
</head>    
    
<body>    
    
<div id="loader">✨ กำลังโหลดความรัก...</div>    
    
<div id="login">    
<h2>🔐 คำถามก่อนเข้าหัวใจ</h2>    
<p>วันเกิดของฮาวาย (6 หลัก)</p>    
<input type="password" id="password">    
<button onclick="checkPass()">เข้าสู่เว็บไซต์</button>    
</div>    
    
<div id="mainSite">    
    
<audio id="bgMusic" loop>    
<source src="music.mp3" type="audio/mpeg">    
</audio>    
    
<div class="container">    
<div class="card" id="mainCard">    
    
<h1>รักฮาวายที่สุด ❤️</h1>    
<img id="coupleImg" src="couple1.jpg">    
    
<p id="counter"></p>    
<p id="message"></p>    
    
<button class="loveBtn" onclick="showLove()">กดบอกรัก 💖</button>    
<button class="secondary" onclick="nextSlide()">ดูรูปถัดไป ➡</button>    
<button class="secondary" onclick="goDetail()">รายละเอียดของเรา 💑</button>    
<button class="secondary" onclick="logout()">ออกจากระบบ 🔓</button>    
    
</div>    
</div>    
    
<div class="popup" id="popup">    
<h2 class="popupTitle">💍 ถึงฮาวายของผม 💖</h2>    
<p class="popupText" id="typeText"></p>    
<button class="loveBtn" onclick="closeLove()">กลับมากอด 💕</button>    
</div>    
    
</div>    
    
<script>

/* ========================= */
/* ระบบล็อกอินสมบูรณ์ 100% */
/* ========================= */

const CORRECT_PASS = "280225";

/* เริ่มต้น: ซ่อนทุกอย่างก่อน */
document.getElementById("login").style.display = "none";
document.getElementById("mainSite").style.display = "none";

/* รอ Loader 3 วิ */
setTimeout(() => {

    const isLogged = sessionStorage.getItem("loveLogin");

    if (isLogged === "true") {
        showMain();
    } else {
        document.getElementById("login").style.display = "flex";
    }

}, 3000);


/* ตรวจรหัส */
function checkPass(){

    let pass = document.getElementById("password").value.trim();

    if(pass === CORRECT_PASS){

        sessionStorage.setItem("loveLogin","true");
        showMain();

    } else {
        alert("ตอบผิดนะคนเก่ง 💔");
    }
}


/* แสดงหน้าเว็บหลัก */
function showMain(){

    document.getElementById("login").style.display="none";
    document.getElementById("mainSite").style.display="block";

    const music = document.getElementById("bgMusic");
    if(music) music.play().catch(()=>{});

    startHearts();
    document.body.style.overflow="auto";
}


/* ออกจากระบบ */
function logout(){
    sessionStorage.removeItem("loveLogin");
    location.reload();
}


/* ========================= */
/* โค้ดเว็บเดิมของคุณ */
/* ========================= */

/* floating hearts */
function startHearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="floating";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),9000);
},800);
}

/* counter */
let startDate=new Date("2025-02-28T00:00:00");
function updateCounter(){
let now=new Date();
let diff=now-startDate;
let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let mins=Math.floor((diff/60000)%60);
let secs=Math.floor((diff/1000)%60);
document.getElementById("counter").innerHTML=
"เราคบกันมาแล้ว<br>"+days+" วัน "+hours+" ชม. "+mins+" นาที "+secs+" วิ 💞";
}
setInterval(updateCounter,1000);

/* slides */
let pages=[
{img:"couple1.jpg",text:"ขอบคุณที่เข้ามาในชีวิตของผม ฮาวาย 💕"},
{img:"couple2.jpg",text:"ทุกช่วงเวลาที่มีฮาวายคือความสุขที่สุด ✨"},
{img:"couple3.jpg",text:"28 กุมภาพันธ์ 2025 คือวันที่ดีที่สุด 💍"}
];
let pageIndex=0;
document.getElementById("message").innerHTML=pages[0].text;

function nextSlide(){
pageIndex++;
if(pageIndex>=pages.length) pageIndex=0;
let img=document.getElementById("coupleImg");
img.classList.add("zoom");
img.src=pages[pageIndex].img;
setTimeout(()=>img.classList.remove("zoom"),600);
document.getElementById("message").innerHTML=pages[pageIndex].text;
}

/* love popup */
const loveMessage=
"ตั้งแต่วันที่ 28 กุมภาพันธ์ 2025 💞\nชีวิตผมก็มีความหมายมากขึ้น\nขอบคุณที่อยู่ข้างกันเสมอ\n \nขอบคุณที่ทำให้ทุกวันเป็นวันพิเศษ ✨\n \nผมจะรักฮาวายแบบนี้ทุกวัน\nและจะไม่ปล่อยมือกันเลยนะ 🤍";

function typeWriter(text, element, speed=40){
let i=0;
element.innerHTML="";
let typing=setInterval(()=>{
if(i<text.length){
element.innerHTML+=text.charAt(i);
i++;
}else{
clearInterval(typing);
}
},speed);
}

function showLove(){
document.getElementById("popup").classList.add("show");
document.getElementById("mainCard").classList.add("blur");
typeWriter(loveMessage,document.getElementById("typeText"));
}

function closeLove(){
document.getElementById("popup").classList.remove("show");
document.getElementById("mainCard").classList.remove("blur");
}

function goDetail(){
window.location.href="detail.html";
}

</script>    
</body>    
</html>
