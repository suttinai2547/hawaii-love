<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Hawaii ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Prompt',sans-serif;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
overflow-x:hidden;
overflow-y:auto;
}
@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.floating{
position:fixed;
bottom:-20px;
font-size:18px;
animation:floatUp linear infinite;
opacity:0.6;
pointer-events:none;
}
@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}
.container{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}
.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
text-align:center;
margin-bottom:60px;
transition:0.5s;
}
.blur{ filter:blur(6px); }
h1{ color:#ff2e63; }
img{
width:100%;
border-radius:20px;
margin-bottom:15px;
transition:0.6s;
}
.zoom{ animation:zoomIn 0.8s ease; }
@keyframes zoomIn{
0%{transform:scale(1.1);opacity:0;}
100%{transform:scale(1);opacity:1;}
}
button{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:40px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}
button:hover{ transform:scale(1.05); }
.loveBtn{
background:linear-gradient(45deg,#ff2e63,#ff6b81);
color:white;
}
.secondary{ background:rgba(0,0,0,0.05); }
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
text-align:center;
transition:0.4s;
z-index:100;
width:85%;
max-width:350px;
}
.popup.show{ transform:translate(-50%,-50%) scale(1); }
.popupTitle{ color:#ff2e63; margin-bottom:15px; font-size:22px; }
.popupText{
font-size:16px;
line-height:1.9;
color:#444;
min-height:140px;
white-space:pre-line;
}
@keyframes burst{
0%{opacity:1;transform:translateY(0) scale(1);}
100%{opacity:0;transform:translateY(-500px) scale(2);}
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainContent">
<div class="card">
<h1>รักฮาวายที่สุด ❤️</h1>
<img id="coupleImg" src="couple1.jpg">
<p id="counter"></p>
<p id="message"></p>
<button class="loveBtn" onclick="showLove()">กดบอกรัก 💖</button>
<button class="secondary" onclick="nextPage()">หน้าถัดไป ➡</button>
</div>
</div>

<div class="popup" id="popup">
<h2 class="popupTitle">💍 ถึงฮาวายของผม 💖</h2>
<p class="popupText" id="typeText"></p>
<button class="loveBtn" onclick="closeLove()">กอดกลับมา 💕</button>
</div>

<script>

document.addEventListener("click", function () {
  const music = document.getElementById("bgMusic");
  music.play();
}, { once: true });

setInterval(()=>{
let heart=document.createElement("div");
heart.className="floating";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),9000);
},700);

let startDate=new Date("2025-02-28T00:00:00");
function updateCounter(){
let now=new Date();
let diff=now-startDate;
let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let mins=Math.floor((diff/60000)%60);
let secs=Math.floor((diff/1000)%60);
document.getElementById("counter").innerHTML=
"เราคบกันมาแล้ว<br>"+days+" วัน "
+hours+" ชม. "+mins+" นาที "+secs+" วิ 💞";
}
setInterval(updateCounter,1000);
updateCounter();

let pages=[
{text:"ขอบคุณที่เข้ามาในชีวิตของผม ฮาวาย 💕",img:"couple1.jpg"},
{text:"ทุกช่วงเวลาที่มีฮาวายคือความสุขที่สุด ✨",img:"couple2.jpg"},
{text:"28 กุมภาพันธ์ 2025 คือวันที่ดีที่สุด 💍",img:"couple3.jpg"}
];
let pageIndex=0;
function nextPage(){
pageIndex++;
if(pageIndex>=pages.length) pageIndex=0;
let img=document.getElementById("coupleImg");
img.classList.add("zoom");
img.src=pages[pageIndex].img;
setTimeout(()=>img.classList.remove("zoom"),800);
document.getElementById("message").innerHTML=pages[pageIndex].text;
}
document.getElementById("message").innerHTML=pages[0].text;

const loveMessage=`ตั้งแต่วันที่ 28 กุมภาพันธ์ 2025 💞
ชีวิตผมก็มีความหมายมากขึ้น

ขอบคุณที่อยู่ข้างกันเสมอ
ขอบคุณที่ทำให้ทุกวันพิเศษ ✨

ผมจะรักฮาวายแบบนี้ไปทุกวัน
และจะไม่ปล่อยมือกันเลยนะ 🤍`;

function typeWriter(text, element, speed=40){
let i=0;
element.innerHTML="";
let typing=setInterval(()=>{
if(i<text.length){
element.innerHTML+=text.charAt(i);
i++;
}else{
clearInterval(typing);
}
},speed);
}

function showLove(){
document.getElementById("popup").classList.add("show");
document.getElementById("mainContent").classList.add("blur");
typeWriter(loveMessage,document.getElementById("typeText"));
}

function closeLove(){
document.getElementById("popup").classList.remove("show");
document.getElementById("mainContent").classList.remove("blur");
}
</script>

</body>
</html>
