<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดของเรา 💑</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Prompt',sans-serif;}

body{
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:#333;
overflow-x:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* floating hearts */
.floating{
position:fixed;
bottom:-20px;
font-size:18px;
animation:floatUp linear infinite;
opacity:0.6;
pointer-events:none;
z-index:1;
}
@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

.container{
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:2;
}

.card{
background:white;
width:100%;
max-width:450px;
padding:25px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
margin-bottom:30px;
text-align:center;
}

h1{color:#ff2e63;margin-bottom:15px;}
h2{color:#ff2e63;margin-bottom:10px;}

img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
margin:10px 0;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.countdown{
font-size:14px;
margin-top:10px;
line-height:1.8;
color:#555;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:30px;
margin-top:10px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{transform:scale(1.05);}

.primary{
background:linear-gradient(45deg,#ff2e63,#ff6b81);
color:white;
}

.secondary{
background:#eee;
}

.uploadBtn{
display:block;
background:linear-gradient(45deg,#ff2e63,#ff6b81);
color:white;
padding:12px;
border-radius:30px;
margin-top:10px;
cursor:pointer;
}
.uploadBtn input{display:none;}

/* popup edit */
.editPopup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.editBox{
background:white;
padding:20px;
border-radius:20px;
width:90%;
max-width:400px;
}

textarea{
width:100%;
height:100px;
border-radius:15px;
padding:10px;
border:1px solid #ddd;
margin:10px 0;
font-family:'Prompt';
}

</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>รายละเอียดของเรา 💖</h1>

<!-- HER -->
<div class="card">
<h2>ปาริฉัตร ศิลาคำ (ฮาวาย)</h2>
<img id="herImg" src="her.jpg">
<p>เกิด 28 กุมภาพันธ์ 2549</p>
<p>อายุ 20 ปี</p>
<p>ราศี มีน ♓</p>

<div class="countdown" id="herCountdown"></div>

<p id="herWish"></p>

<label class="uploadBtn">
📸 เปลี่ยนรูป
<input type="file" accept="image/*" onchange="uploadHer(event)">
</label>

<button class="secondary" onclick="editHer()">✏ แก้คำอวยพร</button>
</div>

<!-- ME -->
<div class="card">
<h2>สุทธินัย บังลาม (มอส)</h2>
<img id="meImg" src="me.jpg">
<p>เกิด 9 สิงหาคม 2547</p>
<p>อายุ 21 ปี</p>
<p>ราศี สิงห์ ♌</p>

<div class="countdown" id="meCountdown"></div>

<p id="myWish"></p>

<label class="uploadBtn">
📸 เปลี่ยนรูป
<input type="file" accept="image/*" onchange="uploadMe(event)">
</label>

<button class="secondary" onclick="editMe()">✏ แก้คำอวยพร</button>
</div>

<button class="primary" onclick="goBack()">⬅ กลับหน้าหลัก</button>

</div>

<!-- popup -->
<div id="editPopup" class="editPopup">
<div class="editBox">
<h3>แก้คำอวยพร</h3>
<textarea id="editInput"></textarea>
<button class="primary" onclick="saveEdit()">บันทึก</button>
<button class="secondary" onclick="closeEdit()">ยกเลิก</button>
</div>
</div>

<script>

/* ========================= */
/* 🔐 ตรวจสอบสิทธิ์เข้า detail */
/* ========================= */

document.addEventListener("DOMContentLoaded", function(){

    const isLogged = sessionStorage.getItem("loveLogin");

    if(isLogged !== "true"){
        // ถ้ายังไม่ได้ล็อกอิน → กลับหน้าแรก
        window.location.href = "index.html";
        return;
    }

});


/* ========================= */
/* 🎵 ระบบเดิมของคุณ */
/* ========================= */

window.onload = function(){
document.getElementById("bgMusic").play().catch(()=>{});
startHearts();
}

/* floating hearts */
function startHearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="floating";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),9000);
},800);
}

/* birthday countdown */
function birthdayCountdown(day,month,id){
setInterval(()=>{
let now=new Date();
let year=now.getFullYear();
let birthday=new Date(year,month-1,day);

if(now>birthday){
birthday=new Date(year+1,month-1,day);
}

let diff=birthday-now;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let mins=Math.floor((diff/60000)%60);
let secs=Math.floor((diff/1000)%60);

document.getElementById(id).innerHTML=
"เหลืออีก "+days+" วัน "+hours+" ชม. "+mins+" นาที "+secs+" วิ 🎂";
},1000);
}

birthdayCountdown(28,2,"herCountdown");
birthdayCountdown(9,8,"meCountdown");

/* wishes */
let herWish=localStorage.getItem("herWish") || 
"ขอให้ฮาวายมีความสุขที่สุดในโลก 💖\nขอให้โตไปเป็นผู้ใหญ่ที่เก่ง\nและยังคงเป็นเด็กบ้าบอที่น่ารักของผมแบบนี้ตลอดไป 🎂";

let myWish=localStorage.getItem("myWish") || 
"ขอให้มอสประสบความสำเร็จ\nมีรายได้สูง มีอิสระ\nและพาฮาวายไปเที่ยวรอบโลก 🌍";

document.getElementById("herWish").innerText=herWish;
document.getElementById("myWish").innerText=myWish;

/* edit system */
let editingType="";

function editHer(){
editingType="her";
document.getElementById("editInput").value=herWish;
document.getElementById("editPopup").style.display="flex";
}

function editMe(){
editingType="me";
document.getElementById("editInput").value=myWish;
document.getElementById("editPopup").style.display="flex";
}

function closeEdit(){
document.getElementById("editPopup").style.display="none";
}

function saveEdit(){
let value=document.getElementById("editInput").value;
if(editingType==="her"){
localStorage.setItem("herWish",value);
}
if(editingType==="me"){
localStorage.setItem("myWish",value);
}
location.reload();
}

/* upload images */
function uploadHer(e){
let reader=new FileReader();
reader.onload=function(){
localStorage.setItem("herImg",reader.result);
document.getElementById("herImg").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}

function uploadMe(e){
let reader=new FileReader();
reader.onload=function(){
localStorage.setItem("meImg",reader.result);
document.getElementById("meImg").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}

if(localStorage.getItem("herImg")){
document.getElementById("herImg").src=localStorage.getItem("herImg");
}
if(localStorage.getItem("meImg")){
document.getElementById("meImg").src=localStorage.getItem("meImg");
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
